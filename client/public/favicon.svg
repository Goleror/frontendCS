<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000"/>
  
  <!-- Neon green glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield outline with cyberpunk style -->
  <path d="M 32 8 L 50 16 L 50 32 C 50 48 32 56 32 56 C 32 56 14 48 14 32 L 14 16 L 32 8 Z" 
        stroke="#00FF41" stroke-width="2" fill="none" filter="url(#glow)"/>
  
  <!-- Center circle with glow -->
  <circle cx="32" cy="32" r="8" fill="#00FF41" filter="url(#glow)"/>
  
  <!-- Inner details -->
  <circle cx="32" cy="32" r="5" fill="#000000"/>
  <circle cx="32" cy="32" r="3" fill="#00FF41" filter="url(#glow)"/>
</svg>
